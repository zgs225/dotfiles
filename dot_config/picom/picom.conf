# Picom compositor config — juansha liuli (Song liquid glass)

backend = "glx";
vsync = true;

# Shadows — shallow and close, "lying on silk" not "floating card"
shadow = true;
shadow-radius = 12;
shadow-offset-x = 0;
shadow-offset-y = 4;
shadow-opacity = 0.35;
shadow-clipping = true;
shadow-exclude = [
    "name = 'Eww - bar'",
    "name = 'Eww - popup-scrim'",
    "name = 'Notification'",
    "class_g = 'slop'",
];

# Fading — snappy
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 4;

# Opacity — frosted glass layering
inactive-opacity = 0.70;
active-opacity = 0.85;
frame-opacity = 0.80;
inactive-opacity-override = false;

opacity-rule = [
    "1:name = 'Eww - popup-scrim'",
    "100:name = 'Eww - bar'",
    "100:class_g = 'Rofi'",
    "85:class_g = 'WezTerm'",
    "100:class_g = 'Dunst'",
];

# Blur — dual_kawase, wallpaper becomes pure ink wash through glass
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 8;
blur-background-frame = false;
blur-background-fixed = true;

blur-background-exclude = [
    "name = 'Eww - popup-scrim'",
    "class_g = 'slop'",
    "window_type = 'desktop'",
];

# Rounded corners — global 5px (Song restraint, no iOS bubbles)
corner-radius = 5;
detect-rounded-corners = true;

rounded-corners-exclude = [
    "name = 'Eww - popup-scrim'",
    "name = 'Eww - bar'",
    "class_g = 'slop'",
    "window_type = 'desktop'",
];

corner-radius-rules = [
    "0:class_g = 'Rofi'",
];

# Misc
unredir-if-possible = false;
no-fading-openclose = false;
no-fading-destroyed-argb = true;
detect-client-opacity = true;
detect-transient = true;

# Window type settings
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.90; focus = true; full-shadow = false; };
    dock = { shadow = false; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 1.0; };
    dropdown_menu = { opacity = 1.0; };
};
