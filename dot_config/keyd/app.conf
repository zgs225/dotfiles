# Per-window overrides for keyd-application-mapper.
# Read at startup by `keyd-application-mapper -d` (started by i3).
# Reload after edits: kill -USR1 $(pgrep -f keyd-application-mapper)
#
# The global Alt→Ctrl-c/v/x/a remap is defined in /etc/keyd/default.conf
# (managed externally). Entries here cancel that remap for matching
# windows so the app sees its native Alt bindings.

[org-wezfurlong-wezterm]
alt.c = A-c
alt.v = A-v
alt.x = A-x
alt.w = A-w
alt.t = A-t
alt.a = A-a

[google-chrome]
alt.[ = C-S-tab
alt.] = macro(C-tab)
alt.l = macro(C-l)
